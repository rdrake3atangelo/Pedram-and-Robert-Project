#==============================================================================
# thresholds.conf — Splunk Macro Definitions for Detection Thresholds
#==============================================================================
# All tunable thresholds for the DLP Detection Engineering Framework are
# defined here as named macros.  Centralizing thresholds in this file
# allows SOC operators to recalibrate detection sensitivity without
# modifying core SPL rule logic.
#
# To apply changes: copy this file to
#   $SPLUNK_HOME/etc/apps/<your_app>/default/macros.conf
# and restart the Splunk search head, or use the Splunk UI under
#   Settings > Advanced Search > Search Macros.
#
# Review cadence: Quarterly, or after any significant change to normal
# traffic baselines (new SaaS rollout, office relocation, M&A activity).
#
# Version : 1.0  |  Author: Detection Engineering Project
#==============================================================================

#------------------------------------------------------------------------------
# UC1 — High-Volume Outbound Transfer
#------------------------------------------------------------------------------
# outbound_bytes_threshold
#   Default : 500,000,000 bytes (500 MB) per host per external domain per hour.
#   Rationale: Transfers above 500 MB in a single hour are statistically rare
#              in the synthetic baseline dataset (<0.01% of host-domain pairs).
#   Raise to : 1,073,741,824 (1 GB) for environments with scheduled nightly
#              backups or large media file workflows.
[outbound_bytes_threshold]
definition = 500000000
iseval = false

#------------------------------------------------------------------------------
# UC3 — DNS-Based Exfiltration
#------------------------------------------------------------------------------
# dns_query_count_threshold
#   Default : 300 DNS queries per source host per hour.
#   Rationale: Benign monitoring agents in the test dataset peaked at ~210
#              queries/hour.  Threshold set to 300 to provide 43% headroom.
#   Raise to : 500 for environments with many automated monitoring tools.
[dns_query_count_threshold]
definition = 300
iseval = false

# dns_subdomain_len_threshold
#   Default : 40 characters (average subdomain length).
#   Rationale: Legitimate hostnames in the dataset averaged 18 chars.
#              Base64-encoded payload subdomains averaged 68 chars.
#              40 chars provides a midpoint with strong separation.
[dns_subdomain_len_threshold]
definition = 40
iseval = false

# dns_entropy_threshold
#   Default : 3.5 bits per character.
#   Rationale: Monitoring agents (false positive source) showed entropy ~2.87.
#              Confirmed tunneling hosts showed entropy 4.08–4.21.
#              3.5 provides clear separation with no observed overlap.
#   Raise to : 3.8 in environments with many monitoring agents or CDN traffic.
[dns_entropy_threshold]
definition = 3.5
iseval = false

#------------------------------------------------------------------------------
# UC4 — Email-Based Exfiltration
#------------------------------------------------------------------------------
# email_send_threshold
#   Default : 50 external emails per user per day.
#   Rationale: Initial threshold of 20 generated FPs from sales/marketing roles.
#              Raised to 50; no FPs observed except one legitimate campaign
#              (added to authorized_senders.csv).
#   Raise to : 100 for organizations with large outbound sales teams.
[email_send_threshold]
definition = 50
iseval = false

# email_recipient_threshold
#   Default : 30 unique external recipients per user per day.
#   Rationale: Complements email_send_threshold; high unique-recipient count
#              indicates broadcast-style exfiltration rather than normal comms.
[email_recipient_threshold]
definition = 30
iseval = false

# email_attach_bytes_threshold
#   Default : 104,857,600 bytes (100 MB) total outbound attachments per day.
#   Rationale: Typical user in dataset sent <5 MB of attachments per day.
#              100 MB threshold is 20x the 95th percentile of benign behaviour.
#   Raise to : 524,288,000 (500 MB) for environments with engineering or
#              media teams who routinely email large files.
[email_attach_bytes_threshold]
definition = 104857600
iseval = false
